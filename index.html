<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treemap Generator Web</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="toolbar">
      <button id="add-item">Add Item</button>
      <button id="remove-item">Remove Item</button>
      <button id="pick-color">Pick Color</button>
      <button id="save-chart">Save Chart</button>
      <button id="load-chart">Open Chart</button>
      <button id="export-svg">Export SVG</button>

      <label class="toolbar-field">
        <span>Color mode</span>
        <select id="color-mode">
          <option value="value-shade">value shade</option>
          <option value="base-only">base only</option>
        </select>
      </label>

      <label class="toolbar-field slider-field">
        <span>Width</span>
        <input id="group-width" type="range" min="180" max="540" value="300">
        <output id="group-width-value">300</output>
      </label>

      <label class="toolbar-field slider-field">
        <span>Height</span>
        <input id="group-height" type="range" min="140" max="520" value="220">
        <output id="group-height-value">220</output>
      </label>

      <div id="status" class="status">Ready</div>
      <input id="group-color-input" type="color" hidden>
      <input id="chart-file-input" type="file" accept=".json,application/json" hidden>
    </header>

    <main class="canvas-wrap">
      <svg id="treemap-svg" aria-label="Treemap editor"></svg>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
